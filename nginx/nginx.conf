# =============================================================================
# SMTP Relay — nginx config
# =============================================================================
# Front-end for the FastAPI UI.
#   - HTTP (:80)  -> redirect 301 to HTTPS
#   - HTTPS (:443) -> proxy_pass to ui:8000
# Response headers here mirror those set by ui.middleware.SecurityHeadersMiddleware;
# applying them at both layers is cheap and covers the case where nginx
# serves a static fallback (e.g., a 50x page) without hitting the UI.
# =============================================================================

user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log  warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent"';
    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;

    # Cap inbound request bodies; the UI itself does not accept file
    # uploads, so 2 MiB is generous for any form POST.
    client_max_body_size 2m;

    # Hide nginx version from error pages / Server header.
    server_tokens off;

    # -------------------------------------------------------------------------
    # HTTP -> HTTPS redirect
    # -------------------------------------------------------------------------
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # -------------------------------------------------------------------------
    # HTTPS terminator
    # -------------------------------------------------------------------------
    server {
        listen 443 ssl default_server;
        listen [::]:443 ssl default_server;
        http2 on;
        server_name _;

        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;

        # Modern profile. If you must support very old clients, relax
        # `ssl_protocols` to include TLSv1.2.
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_ciphers ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # Security headers mirrored from the FastAPI middleware. nginx
        # ships them on static responses too (e.g., 50x pages from the
        # fallback below).
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'self'; img-src 'self' data:; style-src 'self'; script-src 'self'; connect-src 'self'" always;
        add_header Permissions-Policy "geolocation=(), camera=(), microphone=()" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;

        # Upstream UI.
        location / {
            proxy_pass         http://ui:8000;
            proxy_http_version 1.1;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;

            proxy_read_timeout  60s;
            proxy_send_timeout  60s;
            proxy_connect_timeout 5s;

            # Buffering off to keep CSV streaming responsive.
            proxy_buffering off;
        }

        location = /healthz {
            proxy_pass         http://ui:8000/healthz;
            access_log off;
        }

        # Static assets are served by the UI (uvicorn StaticFiles); no
        # separate mount is needed here.
    }
}

# =============================================================================
# Alembic configuration for the SMTP Relay UI container.
# The DB URL is NOT stored here; env.py reads it from DATABASE_URL.
# =============================================================================

[alembic]
script_location = ui/alembic
prepend_sys_path = .

# Kept literal so alembic revision --autogenerate produces predictable names.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

timezone = UTC
truncate_slug_length = 40

# Alembic reads DATABASE_URL at runtime via env.py — no URL here.
sqlalchemy.url =

[post_write_hooks]

# -----------------------------------------------------------------------------
# Logging (kept minimal; goes to stderr inside the container).
# -----------------------------------------------------------------------------

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(asctime)s %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %Y-%m-%d %H:%M:%S
